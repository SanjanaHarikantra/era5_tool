<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ERA5 Wind Tool</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <span class="logo-mark">🌬 ERA5 Wind Tool</span>
    <h1>Create account</h1>
    <p class="subtitle">Access ERA5 100m wind data from Copernicus</p>

    <div id="alert-box"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Jane Smith" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password <span style="color:var(--muted)">(min 6 chars)</span></label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••">
    </div>

    <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">
      Create Account
    </button>

    <p style="text-align:center;margin-top:20px;color:var(--muted);font-size:12px;">
      Already have an account?
      <a href="/" style="color:var(--accent);text-decoration:none;font-weight:700;">Sign in</a>
    </p>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
  if (getToken()) window.location.href = '/dashboard';

  function showAlert(msg, type = 'error') {
    document.getElementById('alert-box').innerHTML =
      `<div class="alert alert-${type}" style="margin-bottom:20px">${msg}</div>`;
  }

  async function doRegister() {
    const btn = document.getElementById('reg-btn');
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    if (!name || !email || !password) { showAlert('All fields are required'); return; }
    if (password !== confirm) { showAlert('Passwords do not match'); return; }
    if (password.length < 6) { showAlert('Password must be at least 6 characters'); return; }

    btn.innerHTML = '<span class="spinner"></span> Creating account...';
    btn.disabled = true;

    const r = await apiCall('POST', '/register', { name, email, password });
    if (r.ok) {
      showAlert(r.data.message + ' Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/', 1800);
    } else {
      showAlert(r.data.error || 'Registration failed');
      btn.innerHTML = 'Create Account';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
