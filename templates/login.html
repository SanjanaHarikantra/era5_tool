<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ERA5 Wind Tool</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <span class="logo-mark">🌬 ERA5 Wind Tool</span>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your wind data dashboard</p>

    <div id="alert-box"></div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
      Sign In
    </button>

    <p style="text-align:center;margin-top:20px;color:var(--muted);font-size:12px;">
      Don't have an account?
      <a href="/register" style="color:var(--accent);text-decoration:none;font-weight:700;">Register</a>
    </p>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
  // Redirect if already logged in
  if (getToken()) window.location.href = '/dashboard';

  function showAlert(msg, type = 'error') {
    document.getElementById('alert-box').innerHTML =
      `<div class="alert alert-${type}" style="margin-bottom:20px">${msg}</div>`;
  }

  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showAlert('Please fill in all fields'); return; }

    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    btn.disabled = true;

    const r = await apiCall('POST', '/login', { email, password });
    if (r.ok) {
      setToken(r.data.token);
      showAlert(r.data.message, 'success');
      setTimeout(() => window.location.href = '/dashboard', 600);
    } else {
      showAlert(r.data.error || 'Login failed');
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
